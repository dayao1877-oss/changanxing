version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: siji_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: siji_db
      MYSQL_USER: siji_user
      MYSQL_PASSWORD: siji_password123
    ports:
      - "3306:3306"
    volumes:
      - siji_mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  siji_mysql_data:
    driver: local
